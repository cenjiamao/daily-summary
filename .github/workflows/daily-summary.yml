name: 每日汇总自动生成

on:
  schedule:
    # 每天早上7:30（北京时间 = UTC+8，即 UTC 23:30 前一天）
    - cron: '30 23 * * *'
  workflow_dispatch:  # 支持手动触发

# 添加写入权限
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: 📇 Checkout 仓库
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🐍 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 安装依赖
      run: pip install requests
    
    - name: 🚀 生成每日汇总 HTML
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python3 .github/scripts/generate_summary.py
    
    - name: 📤 提交并推送
      run: |
        git config user.name "WorkBuddy Auto"
        git config user.email "workbuddy@auto"
        git add index.html 每日汇总_history.json || true
        git diff --cached --quiet || (git commit -m "Update: $(date +'%Y-%m-%d') 每日汇总 [自动生成]" && git push)
